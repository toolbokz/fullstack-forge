<!--
  Static form definitions for Netlify Forms deploy-time detection.
  Required by @netlify/plugin-nextjs@5 — forms in Next.js pages are not detected.
  Actual form UI and submission logic lives in React components.
-->
<html>

<head></head>

<body>
    <form name="lead-capture" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="lead-capture" />
        <input name="bot-field" />
        <input name="name" type="text" />
        <input name="email" type="email" />
        <select name="business-type"></select>
        <input name="website" type="url" />
        <input name="source-page" type="text" />
    </form>
